services:
  api:
    image: ${IMAGE}
    container_name: sante-sn-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
