services:
  api:
    image: ${IMAGE:?Set IMAGE in .env or export IMAGE before running docker compose}
    container_name: sante-sn-api
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const port=process.env.PORT||5000; require('http').get('http://localhost:'+port+'/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));\""
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
