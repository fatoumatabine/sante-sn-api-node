services:
  db:
    image: postgres:16-alpine
    container_name: sante-sn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sante_sn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sante_sn"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sante-sn-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sante_sn?schema=public
      JWT_SECRET: dev_jwt_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: https://sant-sn-indol.vercel.app/
    ports:
      - "5000:5000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
