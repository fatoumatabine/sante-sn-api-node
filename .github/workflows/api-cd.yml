name: API CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: sante-sn-api-node

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          docker build -t "$IMAGE_REF" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_REF"
          docker push "$IMAGE_LATEST"

  deploy:
    needs: build-and-push
    if: ${{ secrets.DEPLOY_SSH_HOST != '' && secrets.DEPLOY_SSH_USER != '' && secrets.DEPLOY_SSH_PRIVATE_KEY != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose file to server
        run: |
          ssh "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "mkdir -p ~/apps/sante-sn-api"
          scp docker-compose.prod.yml "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:~/apps/sante-sn-api/docker-compose.prod.yml"

      - name: Deploy on server
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          ssh "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" <<EOF
          set -e
          APP_DIR=~/apps/sante-sn-api
          mkdir -p "\$APP_DIR"
          cd "\$APP_DIR"
          APP_PORT="${{ secrets.APP_PORT }}"
          [ -z "\$APP_PORT" ] && APP_PORT=5000

          printf '%s\n' \
            "IMAGE=${IMAGE_REF}" \
            "NODE_ENV=production" \
            "PORT=\$APP_PORT" \
            "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" \
            "JWT_EXPIRES_IN=1d" \
            "JWT_REFRESH_EXPIRES_IN=7d" \
            "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" \
            "API_BASE_URL=${{ secrets.API_BASE_URL }}" \
            "SMTP_HOST=${{ secrets.SMTP_HOST }}" \
            "SMTP_PORT=${{ secrets.SMTP_PORT }}" \
            "SMTP_SECURE=${{ secrets.SMTP_SECURE }}" \
            "SMTP_USER=${{ secrets.SMTP_USER }}" \
            "SMTP_PASS=${{ secrets.SMTP_PASS }}" \
            "MAIL_FROM=${{ secrets.MAIL_FROM }}" \
            "PAYDUNYA_MASTER_KEY=${{ secrets.PAYDUNYA_MASTER_KEY }}" \
            "PAYDUNYA_PRIVATE_KEY=${{ secrets.PAYDUNYA_PRIVATE_KEY }}" \
            "PAYDUNYA_TOKEN=${{ secrets.PAYDUNYA_TOKEN }}" \
            "PAYDUNYA_MODE=${{ secrets.PAYDUNYA_MODE }}" \
            "PAYDUNYA_BASE_URL=${{ secrets.PAYDUNYA_BASE_URL }}" \
            "PAYDUNYA_CALLBACK_URL=${{ secrets.PAYDUNYA_CALLBACK_URL }}" \
            "PAYDUNYA_RETURN_URL=${{ secrets.PAYDUNYA_RETURN_URL }}" \
            "PAYDUNYA_CANCEL_URL=${{ secrets.PAYDUNYA_CANCEL_URL }}" \
            "RESET_PASSWORD_TOKEN_TTL_MINUTES=30" \
            "LOG_RESET_TOKEN=false" > .env

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker compose --env-file .env -f docker-compose.prod.yml pull
          docker compose --env-file .env -f docker-compose.prod.yml up -d
          docker compose --env-file .env -f docker-compose.prod.yml exec -T api npx prisma migrate deploy
          docker image prune -f

          curl -fsS "http://localhost:\$APP_PORT/health"
          EOF
