name: API CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Route kernel checks
        run: npm run check:routes-kernel

      - name: Build API
        run: npm run build

      - name: RDV transition rules tests
        run: npm run test:rdv-transitions

      - name: Validate Docker build
        run: docker build -t sante-sn-api-ci:${{ github.sha }} .
